<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Kuis Tebak Skor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            font-family: 'Inter', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(10, 20, 35, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 1rem;
        }
        input, select, textarea {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 0.75rem;
            width: 100%;
            color: white;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
        button {
            transition: all 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .preview-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            background: #1e293b;
        }
    </style>
</head>
<body class="text-gray-200">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                    <i class="fas fa-cog"></i> Panel Admin
                </h1>
                <p class="text-gray-400 text-sm">Kelola pertandingan, leaderboard, dan pengaturan kuis</p>
            </div>
            <a href="index.html" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-xl text-sm flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> Kembali
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Setup Pertandingan -->
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-futbol text-blue-400"></i> Setup Pertandingan</h2>
                
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm mb-1">Nama Tim Tuan Rumah</label>
                            <input type="text" id="homeTeamName" placeholder="Contoh: Liverpool">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">Nama Tim Tamu</label>
                            <input type="text" id="awayTeamName" placeholder="Contoh: Real Madrid">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm mb-1">Logo Tim Tuan Rumah (URL)</label>
                            <input type="text" id="homeTeamLogo" placeholder="https://...">
                            <div class="mt-2"><img id="homePreview" class="preview-logo" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO"></div>
                        </div>
                        <div>
                            <label class="block text-sm mb-1">Logo Tim Tamu (URL)</label>
                            <input type="text" id="awayTeamLogo" placeholder="https://...">
                            <div class="mt-2"><img id="awayPreview" class="preview-logo" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO"></div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm mb-1">Tanggal & Waktu</label>
                            <input type="datetime-local" id="matchDateTime">
                        </div>
                        <div>
                            <label class="block text-sm mb-1">Status Pertandingan</label>
                            <select id="matchStatus">
                                <option value="upcoming">Akan Datang</option>
                                <option value="live">Sedang Berlangsung</option>
                                <option value="ended">Selesai</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm mb-1">Hasil Akhir (kosongkan jika belum selesai)</label>
                        <div class="flex gap-3 items-center">
                            <input type="number" id="finalScoreHome" placeholder="0" class="w-1/3 text-center">
                            <span class="text-blue-400 font-bold">:</span>
                            <input type="number" id="finalScoreAway" placeholder="0" class="w-1/3 text-center">
                        </div>
                    </div>
                    
                    <button id="saveMatchBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-semibold mt-2">
                        <i class="fas fa-save"></i> Simpan Pengaturan
                    </button>
                </div>
            </div>
            
            <!-- Pengaturan Lainnya -->
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-clock text-blue-400"></i> Waktu Kuis</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1">Batas Waktu Tebak (menit)</label>
                        <input type="number" id="deadlineMinutes" value="90" min="1" max="1440">
                        <p class="text-xs text-gray-500 mt-1">Hitung mundur dari waktu pertandingan</p>
                    </div>
                    
                    <div class="border-t border-gray-700 pt-4 mt-2">
                        <h3 class="font-semibold mb-3"><i class="fas fa-gavel"></i> Syarat & Ketentuan</h3>
                        <textarea id="rulesText" rows="6" class="text-sm" placeholder="Tulis syarat & ketentuan di sini..."></textarea>
                    </div>
                    
                    <div class="border-t border-gray-700 pt-4 mt-2">
                        <h3 class="font-semibold mb-3"><i class="fas fa-gift"></i> Info Hadiah</h3>
                        <textarea id="prizeText" rows="4" class="text-sm" placeholder="Tulis info hadiah di sini..."></textarea>
                    </div>
                    
                    <button id="saveSettingsBtn" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-semibold">
                        <i class="fas fa-save"></i> Simpan Pengaturan
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Manajemen Leaderboard -->
        <div class="glass-card p-6 mt-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold flex items-center gap-2"><i class="fas fa-trophy text-yellow-400"></i> Manajemen Leaderboard</h2>
                <div class="flex gap-2">
                    <button id="resetLeaderboard" class="bg-red-600/50 hover:bg-red-600 px-3 py-1.5 rounded-lg text-sm">
                        <i class="fas fa-trash"></i> Reset Semua
                    </button>
                    <button id="calculateWinners" class="bg-green-600/50 hover:bg-green-600 px-3 py-1.5 rounded-lg text-sm">
                        <i class="fas fa-crown"></i> Hitung Pemenang
                    </button>
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-800/50">
                        <tr class="text-blue-300">
                            <th class="p-3 text-left">Username</th>
                            <th class="p-3 text-left">WA</th>
                            <th class="p-3 text-center">Prediksi</th>
                            <th class="p-3 text-center">Waktu</th>
                            <th class="p-3 text-center">Status</th>
                            <th class="p-3 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="adminLeaderboardBody">
                        <tr><td colspan="6" class="text-center py-8 text-gray-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
