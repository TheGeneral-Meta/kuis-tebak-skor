<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kuis Tebak Skor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        .navbar {
            background: rgba(10, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-links { display: flex; gap: 1rem; }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-links a:hover, .nav-links a.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
        .header-section { text-align: center; margin-bottom: 2.5rem; }
        .header-section h1 { font-size: 2.5rem; font-weight: 800; }
        .gradient-text { background: linear-gradient(135deg, #60a5fa, #2dd4bf); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        @media (max-width: 768px) { .admin-grid { grid-template-columns: 1fr; } }
        .admin-card {
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            overflow: hidden;
        }
        .admin-card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            flex-wrap: wrap;
        }
        .admin-card-header i { font-size: 1.25rem; color: #3b82f6; }
        .admin-card-header h2 { font-size: 1.125rem; font-weight: 600; flex: 1; }
        .card-actions { display: flex; gap: 0.75rem; }
        .admin-card-body { padding: 1.5rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.5rem; color: #cbd5e1; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #e2e8f0;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .logo-preview img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-top: 0.5rem; border: 1px solid #3b82f6; }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
        }
        .btn-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: #4ade80;
            cursor: pointer;
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: #f87171;
            cursor: pointer;
        }
        .table-responsive { overflow-x: auto; }
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 0.875rem; text-align: left; border-bottom: 1px solid rgba(59, 130, 246, 0.15); }
        .data-table th { background: rgba(0, 0, 0, 0.2); color: #94a3b8; }
        .delete-btn { background: none; border: none; color: #f87171; cursor: pointer; }
        .status-correct { color: #4ade80; }
        .status-wrong { color: #f87171; }
        .status-pending { color: #fbbf24; }
        .empty-state { text-align: center; padding: 2rem; color: #64748b; }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="nav-brand"><i class="fas fa-crown"></i><span>Admin Panel</span></div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Beranda</a>
            <a href="admin.html" class="active"><i class="fas fa-cog"></i> Admin</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="header-section">
        <h1>Panel <span class="gradient-text">Administrator</span></h1>
        <p>Kelola pertandingan, leaderboard, dan pengaturan kuis</p>
    </div>

    <div class="admin-grid">
        <!-- Setup Pertandingan -->
        <div class="admin-card">
            <div class="admin-card-header"><i class="fas fa-futbol"></i><h2>Setup Pertandingan</h2></div>
            <div class="admin-card-body">
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-home"></i> Tim Tuan Rumah</label><input type="text" id="homeTeamName" placeholder="Liverpool"></div>
                    <div class="form-group"><label><i class="fas fa-flag-checkered"></i> Tim Tamu</label><input type="text" id="awayTeamName" placeholder="Real Madrid"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-image"></i> Logo Tuan Rumah (URL)</label><input type="text" id="homeTeamLogo" placeholder="https://..."><div class="logo-preview"><img id="homePreview" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO"></div></div>
                    <div class="form-group"><label><i class="fas fa-image"></i> Logo Tamu (URL)</label><input type="text" id="awayTeamLogo" placeholder="https://..."><div class="logo-preview"><img id="awayPreview" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO"></div></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label><i class="far fa-calendar"></i> Tanggal & Waktu</label><input type="datetime-local" id="matchDateTime"></div>
                    <div class="form-group"><label><i class="fas fa-tag"></i> Status</label><select id="matchStatus"><option value="upcoming">🟡 Akan Datang</option><option value="live">🟢 Sedang Berlangsung</option><option value="ended">🔴 Selesai</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label><i class="fas fa-clock"></i> Skor Akhir (Home)</label><input type="number" id="finalScoreHome" placeholder="0"></div>
                    <div class="form-group"><label><i class="fas fa-clock"></i> Skor Akhir (Away)</label><input type="number" id="finalScoreAway" placeholder="0"></div>
                </div>
                <button id="saveMatchBtn" class="btn-primary"><i class="fas fa-save"></i> Simpan Pengaturan</button>
            </div>
        </div>
        
        <!-- Pengaturan Lainnya -->
        <div class="admin-card">
            <div class="admin-card-header"><i class="fas fa-sliders-h"></i><h2>Pengaturan Lainnya</h2></div>
            <div class="admin-card-body">
                <div class="form-group"><label><i class="fas fa-gavel"></i> Syarat & Ketentuan</label><textarea id="rulesText" rows="6" placeholder="Tulis syarat & ketentuan..."></textarea></div>
                <div class="form-group"><label><i class="fas fa-gift"></i> Info Hadiah</label><textarea id="prizeText" rows="4" placeholder="Tulis info hadiah..."></textarea></div>
                <button id="saveSettingsBtn" class="btn-primary"><i class="fas fa-save"></i> Simpan Pengaturan</button>
            </div>
        </div>
    </div>
    
    <!-- Manajemen Leaderboard -->
    <div class="admin-card full-width">
        <div class="admin-card-header">
            <i class="fas fa-trophy"></i><h2>Manajemen Leaderboard</h2>
            <div class="card-actions">
                <button id="calculateWinners" class="btn-success"><i class="fas fa-crown"></i> Hitung Pemenang</button>
                <button id="resetLeaderboard" class="btn-danger"><i class="fas fa-trash-alt"></i> Reset Semua</button>
            </div>
        </div>
        <div class="admin-card-body">
            <div class="table-responsive">
                <table class="data-table">
                    <thead><tr><th>ID</th><th>Username</th><th>WhatsApp</th><th>Prediksi</th><th>Waktu Tebak</th><th>Status</th><th>Aksi</th></tr></thead>
                    <tbody id="adminLeaderboardBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// ============ DATA ============
let config = {
    homeTeam: { name: "Liverpool", logo: "https://placehold.co/100x100/1e293b/3b82f6?text=LIV" },
    awayTeam: { name: "Real Madrid", logo: "https://placehold.co/100x100/1e293b/3b82f6?text=RMA" },
    matchDate: new Date(new Date().getTime() + 2 * 60 * 60 * 1000).toISOString().slice(0, 16),
    matchStatus: "upcoming",
    finalScore: { home: null, away: null },
    rules: "1. 1 akun hanya 1 kali submit\n2. Tebakan sebelum pertandingan dimulai\n3. Pemenang berdasarkan skor tepat & waktu tercepat\n4. Keputusan admin mutlak",
    prizes: "🏆 HADIAH 🏆\n\n🥇 Gold: Rp 500.000\n🥈 Silver: Rp 200.000\n🎫 Free: E-Voucher Rp 50.000"
};
let predictions = [];

function loadData() {
    const savedConfig = localStorage.getItem('quiz_config');
    if (savedConfig) config = JSON.parse(savedConfig);
    const savedPredictions = localStorage.getItem('quiz_predictions');
    if (savedPredictions) predictions = JSON.parse(savedPredictions);
    populateForm();
    updateAdminTable();
}

function populateForm() {
    document.getElementById('homeTeamName').value = config.homeTeam.name;
    document.getElementById('awayTeamName').value = config.awayTeam.name;
    document.getElementById('homeTeamLogo').value = config.homeTeam.logo;
    document.getElementById('awayTeamLogo').value = config.awayTeam.logo;
    document.getElementById('homePreview').src = config.homeTeam.logo;
    document.getElementById('awayPreview').src = config.awayTeam.logo;
    document.getElementById('matchDateTime').value = config.matchDate;
    document.getElementById('matchStatus').value = config.matchStatus;
    document.getElementById('finalScoreHome').value = config.finalScore.home !== null ? config.finalScore.home : '';
    document.getElementById('finalScoreAway').value = config.finalScore.away !== null ? config.finalScore.away : '';
    document.getElementById('rulesText').value = config.rules;
    document.getElementById('prizeText').value = config.prizes;
}

function updateAdminTable() {
    const tbody = document.getElementById('adminLeaderboardBody');
    if (!predictions.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-state"><i class="fas fa-inbox"></i> Belum ada data</td></tr>`;
        return;
    }
    let html = '';
    predictions.forEach(pred => {
        let isCorrect = (config.matchStatus === 'ended' && config.finalScore.home !== null && pred.scoreHome === config.finalScore.home && pred.scoreAway === config.finalScore.away);
        let statusClass = isCorrect ? 'status-correct' : (config.matchStatus === 'ended' ? 'status-wrong' : 'status-pending');
        let statusText = isCorrect ? 'Tepat' : (config.matchStatus === 'ended' ? 'Tidak Tepat' : 'Menunggu');
        html += `<tr>
            <td>${pred.id}</td>
            <td><i class="fas fa-user-circle"></i> ${pred.username}</td>
            <td>${pred.contact}</td>
            <td><strong>${pred.scoreHome} : ${pred.scoreAway}</strong></td>
            <td>${new Date(pred.timestamp).toLocaleString()}</td>
            <td class="${statusClass}">${statusText}</td>
            <td><button class="delete-btn" onclick="deletePrediction(${pred.id})"><i class="fas fa-trash"></i> Hapus</button></td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

window.deletePrediction = (id) => {
    if (confirm('Hapus tebakan ini?')) {
        predictions = predictions.filter(p => p.id !== id);
        localStorage.setItem('quiz_predictions', JSON.stringify(predictions));
        updateAdminTable();
        alert('Tebakan dihapus');
    }
};

// Save match
document.getElementById('saveMatchBtn').onclick = () => {
    config.homeTeam = { name: document.getElementById('homeTeamName').value, logo: document.getElementById('homeTeamLogo').value || 'https://placehold.co/100x100/1e293b/3b82f6?text=HOME' };
    config.awayTeam = { name: document.getElementById('awayTeamName').value, logo: document.getElementById('awayTeamLogo').value || 'https://placehold.co/100x100/1e293b/3b82f6?text=AWAY' };
    config.matchDate = document.getElementById('matchDateTime').value;
    config.matchStatus = document.getElementById('matchStatus').value;
    config.finalScore = { home: document.getElementById('finalScoreHome').value ? parseInt(document.getElementById('finalScoreHome').value) : null, away: document.getElementById('finalScoreAway').value ? parseInt(document.getElementById('finalScoreAway').value) : null };
    localStorage.setItem('quiz_config', JSON.stringify(config));
    alert('✅ Pengaturan disimpan!');
};

// Save settings
document.getElementById('saveSettingsBtn').onclick = () => {
    config.rules = document.getElementById('rulesText').value;
    config.prizes = document.getElementById('prizeText').value;
    localStorage.setItem('quiz_config', JSON.stringify(config));
    alert('✅ Pengaturan disimpan!');
};

// Reset all
document.getElementById('resetLeaderboard').onclick = () => {
    if (confirm('⚠️ Hapus semua tebakan?')) {
        predictions = [];
        localStorage.setItem('quiz_predictions', JSON.stringify(predictions));
        updateAdminTable();
        alert('Semua tebakan dihapus');
    }
};

// Calculate winners
document.getElementById('calculateWinners').onclick = () => {
    if (config.matchStatus !== 'ended') { alert('Ubah status ke "Selesai" terlebih dahulu'); return; }
    if (config.finalScore.home === null) { alert('Masukkan skor akhir'); return; }
    const correct = predictions.filter(p => p.scoreHome === config.finalScore.home && p.scoreAway === config.finalScore.away).sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
    if (!correct.length) { alert('Tidak ada tebakan tepat'); return; }
    let msg = `🏆 PEMENANG 🏆\nSkor: ${config.finalScore.home}:${config.finalScore.away}\n\n`;
    correct.slice(0,5).forEach((p,i) => { msg += `${i+1}. ${p.username} (${p.scoreHome}:${p.scoreAway})\n`; });
    alert(msg);
};

// Logo preview
document.getElementById('homeTeamLogo').oninput = () => { document.getElementById('homePreview').src = document.getElementById('homeTeamLogo').value || 'https://placehold.co/100x100/1e293b/3b82f6?text=LOGO'; };
document.getElementById('awayTeamLogo').oninput = () => { document.getElementById('awayPreview').src = document.getElementById('awayTeamLogo').value || 'https://placehold.co/100x100/1e293b/3b82f6?text=LOGO'; };

loadData();
</script>
</body>
</html>
