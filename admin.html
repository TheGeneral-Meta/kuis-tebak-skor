<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kuis Tebak Skor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-crown"></i>
                <span>Admin Panel</span>
            </div>
            <div class="nav-links">
                <a href="index.html"><i class="fas fa-home"></i> Beranda</a>
                <a href="admin.html" class="active"><i class="fas fa-cog"></i> Admin</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header-section">
            <h1>Panel <span class="gradient-text">Administrator</span></h1>
            <p>Kelola pertandingan, leaderboard, dan pengaturan kuis</p>
        </div>

        <div class="admin-grid">
            <!-- Setup Pertandingan -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <i class="fas fa-futbol"></i>
                    <h2>Setup Pertandingan</h2>
                </div>
                <div class="admin-card-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-home"></i> Tim Tuan Rumah</label>
                            <input type="text" id="homeTeamName" placeholder="Contoh: Liverpool">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-flag-checkered"></i> Tim Tamu</label>
                            <input type="text" id="awayTeamName" placeholder="Contoh: Real Madrid">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-image"></i> Logo Tuan Rumah (URL)</label>
                            <input type="text" id="homeTeamLogo" placeholder="https://...">
                            <div class="logo-preview">
                                <img id="homePreview" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO" alt="Preview">
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-image"></i> Logo Tamu (URL)</label>
                            <input type="text" id="awayTeamLogo" placeholder="https://...">
                            <div class="logo-preview">
                                <img id="awayPreview" src="https://placehold.co/100x100/1e293b/3b82f6?text=LOGO" alt="Preview">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="far fa-calendar"></i> Tanggal & Waktu</label>
                            <input type="datetime-local" id="matchDateTime">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Status</label>
                            <select id="matchStatus">
                                <option value="upcoming">🟡 Akan Datang</option>
                                <option value="live">🟢 Sedang Berlangsung</option>
                                <option value="ended">🔴 Selesai</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Skor Akhir (Tuan Rumah)</label>
                            <input type="number" id="finalScoreHome" placeholder="0" min="0">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-clock"></i> Skor Akhir (Tamu)</label>
                            <input type="number" id="finalScoreAway" placeholder="0" min="0">
                        </div>
                    </div>
                    
                    <button id="saveMatchBtn" class="btn-primary full-width">
                        <i class="fas fa-save"></i> Simpan Pengaturan
                    </button>
                </div>
            </div>
            
            <!-- Pengaturan Lainnya -->
            <div class="admin-card">
                <div class="admin-card-header">
                    <i class="fas fa-sliders-h"></i>
                    <h2>Pengaturan Lainnya</h2>
                </div>
                <div class="admin-card-body">
                    <div class="form-group">
                        <label><i class="far fa-hourglass"></i> Batas Waktu Tebak (menit)</label>
                        <input type="number" id="deadlineMinutes" value="90" min="1" max="1440">
                        <div class="input-hint">Dihitung mundur dari waktu pertandingan</div>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-gavel"></i> Syarat & Ketentuan</label>
                        <textarea id="rulesText" rows="6" placeholder="Tulis syarat & ketentuan di sini..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-gift"></i> Info Hadiah</label>
                        <textarea id="prizeText" rows="4" placeholder="Tulis info hadiah di sini..."></textarea>
                    </div>
                    
                    <button id="saveSettingsBtn" class="btn-primary full-width">
                        <i class="fas fa-save"></i> Simpan Pengaturan
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Manajemen Leaderboard -->
        <div class="admin-card full-width">
            <div class="admin-card-header">
                <i class="fas fa-trophy"></i>
                <h2>Manajemen Leaderboard</h2>
                <div class="card-actions">
                    <button id="calculateWinners" class="btn-success">
                        <i class="fas fa-crown"></i> Hitung Pemenang
                    </button>
                    <button id="resetLeaderboard" class="btn-danger">
                        <i class="fas fa-trash-alt"></i> Reset Semua
                    </button>
                </div>
            </div>
            <div class="admin-card-body">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>WhatsApp</th>
                                <th>Prediksi</th>
                                <th>Waktu Tebak</th>
                                <th>Status</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="adminLeaderboardBody">
                            <tr class="empty-row">
                                <td colspan="7">
                                    <div class="empty-state">
                                        <i class="fas fa-inbox"></i>
                                        <p>Belum ada data tebakan</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="admin-script.js"></script>
</body>
</html>
